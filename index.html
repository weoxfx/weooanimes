<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weoo Animes</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">WEOO<span>ANIMES</span></div>

<div class="search-box">
<input id="searchInput" placeholder="Search anime...">
<button onclick="searchAnime()">Search</button>
</div>

</div>


<!-- HERO -->

<section id="hero" class="hero">

<div class="hero-content">

<div class="badge">NOW AIRING</div>

<h1 id="heroTitle">Loading<br><span>Anime...</span></h1>

<p id="heroDesc">
Fetching featured anime...
</p>

<div class="hero-buttons">

<button class="btn btn-primary">Watch Now</button>

<button class="btn btn-secondary">More Info</button>

</div>

</div>

</section>


<!-- TRENDING -->

<section class="section">

<h2>Trending Anime</h2>

<div id="trending" class="grid"></div>

</section>


<!-- SEARCH RESULTS -->

<section class="section">

<h2>Search Results</h2>

<div id="results" class="grid"></div>

</section>



<script>

const API = "https://api.jikan.moe/v4";

async function loadTrending(){

const res = await fetch(API + "/top/anime?limit=12");

const data = await res.json();

const container = document.getElementById("trending");

container.innerHTML="";

data.data.forEach(a=>{

const card = document.createElement("div");
card.className="card";

card.innerHTML=`

<img src="${a.images.jpg.image_url}">

<p>${a.title}</p>

`;

container.appendChild(card);

});

}


async function searchAnime(){

const q = document.getElementById("searchInput").value;

if(!q) return;

const res = await fetch(API + "/anime?q="+q+"&limit=12");

const data = await res.json();

const container = document.getElementById("results");

container.innerHTML="";

data.data.forEach(a=>{

const card = document.createElement("div");
card.className="card";

card.innerHTML=`

<img src="${a.images.jpg.image_url}">
<p>${a.title}</p>

`;

container.appendChild(card);

});

}


async function loadHero(){

const res = await fetch(API + "/top/anime?filter=airing&limit=1");

const data = await res.json();

const anime = data.data[0];

document.getElementById("heroTitle").innerHTML =
anime.title + "<br><span>Now Airing</span>";

document.getElementById("heroDesc").textContent =
anime.synopsis.slice(0,200)+"...";

document.getElementById("hero").style.background =
`linear-gradient(to top, rgba(8,11,17,0.95), rgba(8,11,17,0.4)),
url(${anime.images.jpg.large_image_url}) center/cover no-repeat`;

}


loadTrending();
loadHero();

</script>

</body>
</html>
